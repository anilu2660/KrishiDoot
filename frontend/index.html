<!doctype html>
<html lang="en" class="bg-soil-950">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#17140f" />
    <meta name="description" content="KrishiDoot.AI — AI-powered crop negotiation for Indian farmers" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['DM Sans', 'system-ui', 'sans-serif'],
              display: ['Fraunces', 'Georgia', 'serif'],
            },
            colors: {
              gray: {
                950: '#0f0d09',
                900: '#17140f',
                850: '#1f1a14',
                800: '#2a241d',
                750: '#342d24',
                700: '#463d31',
              },
              soil: { 950: '#0f0d09', 900: '#17140f', 800: '#2a241d' },
              field: { 900: '#171d14', 800: '#232b1d', 700: '#334127' },
              mist: { 100: '#f3eee2', 200: '#e5dccb', 300: '#d4c8b1', 400: '#b8aa90', 500: '#857864' },
              leaf: { 300: '#a4c775', 400: '#7caf4d', 500: '#678f39', 600: '#4f6f2c' },
              millet: { 200: '#f0debc', 300: '#dcc08a', 400: '#c9a96c' },
              rain: { 300: '#a6d2de', 400: '#7bb6c8' },
              heat: { 300: '#dba176', 400: '#c57b4b' },
              danger: { 300: '#e6a08e', 400: '#c25d46' },
            },
          },
        },
      }
    </script>
    <style>
      /* ── Global tokens ─────────────────────────────────────── */
      :root {
        --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
        --dur-micro: 120ms;
        --dur-ui: 240ms;
        --dur-entrance: 560ms;
      }

      /* ── Base ──────────────────────────────────────────────── */
      html { scroll-behavior: auto; background: #080c09; }
      body { background: #080c09; line-height: 1.6; }

      /* Extra breathing room for light-on-dark text */
      p, li { line-height: 1.65; }

      /* ── Headings use display font ──────────────────────────── */
      h1, h2, h3, h4, .font-display { font-family: 'Space Grotesk', system-ui, sans-serif; letter-spacing: -0.02em; }

      /* ── Scrollbar ──────────────────────────────────────────── */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #0d1410; }
      ::-webkit-scrollbar-thumb { background: #2a3a2b; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #16a34a44; }

      /* ── Swiper ─────────────────────────────────────────────── */
      .swiper-pagination-bullet { background: #2a3a2b !important; opacity: 1 !important; }
      .swiper-pagination-bullet-active { background: #4ade80 !important; }

      /* ── Button micro-interaction ───────────────────────────── */
      button:active:not(:disabled) { transform: scale(0.97); }

      /* ── Reduced motion ─────────────────────────────────────── */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* ── Ambient glow for key cards ─────────────────────────── */
      .glow-green {
        box-shadow: 0 0 40px -10px rgba(22, 163, 74, 0.25),
                    0 0 80px -30px rgba(22, 163, 74, 0.12);
      }
      .glow-emerald {
        box-shadow: 0 0 40px -10px rgba(52, 211, 153, 0.2),
                    0 0 80px -30px rgba(52, 211, 153, 0.1);
      }
      .glow-amber {
        box-shadow: 0 0 40px -10px rgba(251, 191, 36, 0.2),
                    0 0 80px -30px rgba(251, 191, 36, 0.08);
      }
    </style>
    <style>
      :root {
        --soil-950: #0f0d09;
        --soil-900: #17140f;
        --soil-800: #221c16;
        --field-900: #171d14;
        --field-800: #232b1d;
        --field-700: #334127;
        --mist-100: #f3eee2;
        --mist-200: #e5dccb;
        --mist-300: #d4c8b1;
        --mist-400: #b8aa90;
        --mist-500: #857864;
        --leaf-300: #a4c775;
        --leaf-400: #7caf4d;
        --leaf-500: #678f39;
        --leaf-600: #4f6f2c;
        --millet-200: #f0debc;
        --millet-300: #dcc08a;
        --millet-400: #c9a96c;
        --rain-300: #a6d2de;
        --heat-300: #dba176;
        --danger-300: #e6a08e;

        --bg-base: var(--soil-950);
        --bg-card: var(--soil-900);
        --bg-card-2: var(--soil-800);
        --bg-nav: rgba(18, 15, 11, 0.92);
        --border-subtle: rgba(124, 175, 77, 0.18);
        --border-card: rgba(255, 255, 255, 0.1);
        --text-primary: var(--mist-100);
        --text-secondary: var(--mist-300);
        --text-muted: var(--mist-500);
        --text-faint: rgba(229, 220, 203, 0.45);
        --shadow-card: 0 22px 70px rgba(0, 0, 0, 0.28);
        --shadow-nav: 0 -8px 36px rgba(0, 0, 0, 0.22);
        --glow-green: 0 0 40px -10px rgba(124, 175, 77, 0.3);
        --glow-amber: 0 0 40px -10px rgba(209, 174, 108, 0.24);
        --input-bg: rgba(23, 20, 15, 0.74);
        --input-border: rgba(255, 255, 255, 0.1);
        --scrollbar-thumb: rgba(124, 175, 77, 0.34);
      }

      html { background: var(--soil-950); }
      body {
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(201, 169, 108, 0.14), transparent 32%),
          radial-gradient(circle at top right, rgba(104, 143, 57, 0.12), transparent 26%),
          linear-gradient(180deg, #120f0b 0%, #0f0d09 65%, #120f0b 100%);
        color: var(--mist-100);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.14;
        background-image:
          linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 120px 120px;
        mask-image: radial-gradient(circle at center, black 10%, transparent 78%);
      }

      h1, h2, h3, h4, .font-display { font-family: 'Fraunces', Georgia, serif; letter-spacing: -0.03em; }
      .tabular-nums { font-variant-numeric: tabular-nums; }
      .no-scrollbar { scrollbar-width: none; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      ::-webkit-scrollbar { width: 7px; height: 7px; }
      ::-webkit-scrollbar-track { background: rgba(23, 20, 15, 0.92); }
      ::-webkit-scrollbar-thumb { background: rgba(124, 175, 77, 0.34); border-radius: 999px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(124, 175, 77, 0.5); }
      .swiper-pagination-bullet { background: rgba(229,220,203,0.24) !important; opacity: 1 !important; }
      .swiper-pagination-bullet-active { background: var(--leaf-400) !important; }
      .grain-surface { position: relative; }
      .grain-surface::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        opacity: 0.12;
        background-image: radial-gradient(rgba(255,255,255,0.7) 0.45px, transparent 0.45px);
        background-size: 9px 9px;
        mix-blend-mode: soft-light;
      }
      .field-glow {
        box-shadow:
          0 0 0 1px rgba(124, 175, 77, 0.12),
          0 24px 80px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255,255,255,0.04);
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
    <title>KrishiDoot.AI — Fair prices for every Indian farmer</title>
  </head>
  <body class="font-sans antialiased text-mist-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
