name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_KEY }}

      - name: Configure Docker
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build Image
        run: |
          docker build -t asia-south1-docker.pkg.dev/YOUR_PROJECT_ID/my-repo/app .

      - name: Push Image
        run: |
          docker push asia-south1-docker.pkg.dev/YOUR_PROJECT_ID/my-repo/app

      - name: Deploy
        run: |
          gcloud run deploy my-service \
            --image asia-south1-docker.pkg.dev/YOUR_PROJECT_ID/my-repo/app \
            --region asia-south1 \
            --platform managed \
            --allow-unauthenticated
